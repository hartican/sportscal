<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jack's Sports Calendar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

:root{
  --bg: #0a0a0f;
  --bg-elev: #131318;
  --bg-card: #16161d;
  --bg-card-hover: #1c1c25;
  --border: #26262f;
  --text: #f4f4f6;
  --text-dim: #9a9aa6;
  --text-faint: #5f5f6b;
  --accent: #00e5ff;

  --c-f1: #e8002d;
  --c-rugby: #1a6b3a;
  --c-tennis: #4a7c59;
  --c-football: #1d6fa4;
  --c-cycling: #f7d000;
  --c-nrl: #0047ab;
  --c-cricket: #b5793a;
  --c-nba: #c9082a;
  --c-golf: #1e5128;
  --c-lemans: #d4a017;
  --c-ski: #4fc3f7;
  --c-nfl: #1a237e;
}

*{box-sizing:border-box; margin:0; padding:0;}

html,body{
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height:100vh;
}

body{
  background:
    radial-gradient(circle at 20% 0%, rgba(0,229,255,0.06), transparent 40%),
    radial-gradient(circle at 80% 10%, rgba(232,0,45,0.05), transparent 40%),
    var(--bg);
  padding-bottom: 60px;
}

a{color:inherit;}

/* ---------- Header ---------- */
header.top{
  position: sticky;
  top:0;
  z-index: 50;
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(14px) saturate(150%);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px;
}

.header-inner{
  max-width: 1100px;
  margin: 0 auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap: 12px;
  flex-wrap: wrap;
}

.brand{
  display:flex;
  flex-direction:column;
  gap:2px;
}

.brand h1{
  font-size: 1.35rem;
  font-weight: 900;
  letter-spacing: -0.02em;
  background: linear-gradient(90deg, #fff, #00e5ff);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

.brand .clock{
  font-size: 0.78rem;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
  font-weight: 500;
}

.header-actions{
  display:flex;
  gap:8px;
  flex-wrap: wrap;
}

.btn{
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 9px 14px;
  border-radius: 10px;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s ease;
  font-family: inherit;
  white-space: nowrap;
}

.btn:hover{
  background: var(--bg-card-hover);
  border-color: #3a3a45;
  transform: translateY(-1px);
}

.btn.primary{
  background: linear-gradient(135deg, #00e5ff, #0088ff);
  color: #05050a;
  border: none;
  font-weight: 800;
}

.btn.primary:hover{
  filter: brightness(1.1);
}

.btn.ghost{
  background: transparent;
}

/* ---------- Tabs ---------- */
.tabs{
  max-width: 1100px;
  margin: 16px auto 0;
  padding: 0 20px;
  display:flex;
  gap: 6px;
}

.tab-btn{
  background: transparent;
  border: none;
  color: var(--text-dim);
  padding: 10px 16px;
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  font-family: inherit;
  transition: all 0.15s;
}

.tab-btn:hover{ color: var(--text); }

.tab-btn.active{
  color: var(--text);
  border-bottom-color: var(--accent);
}

/* ---------- Controls bar ---------- */
.controls{
  max-width: 1100px;
  margin: 14px auto 0;
  padding: 0 20px;
  display:flex;
  flex-direction: column;
  gap: 12px;
}

.filter-row{
  display:flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items:center;
}

.pill{
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 7px 13px;
  border-radius: 999px;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  display:flex;
  align-items:center;
  gap: 6px;
}

.pill:hover{
  color: var(--text);
  border-color: #3a3a45;
}

.pill.active{
  color: #05050a;
  background: var(--pill-color, var(--accent));
  border-color: var(--pill-color, var(--accent));
  font-weight: 800;
}

.view-toggle{
  display:flex;
  gap: 4px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 3px;
  width: fit-content;
}

.view-toggle button{
  background: transparent;
  border:none;
  color: var(--text-dim);
  padding: 7px 14px;
  border-radius: 8px;
  font-size: 0.78rem;
  font-weight: 700;
  cursor:pointer;
  font-family: inherit;
}

.view-toggle button.active{
  background: var(--accent);
  color: #05050a;
}

/* ---------- Main content ---------- */
main{
  max-width: 1100px;
  margin: 20px auto;
  padding: 0 20px;
}

.date-group{
  margin-bottom: 28px;
}

.date-heading{
  font-size: 0.82rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-dim);
  margin-bottom: 10px;
  padding-left: 2px;
  display:flex;
  align-items:center;
  gap:8px;
}

.date-heading .today-flag{
  background: var(--accent);
  color:#05050a;
  padding: 1px 8px;
  border-radius: 6px;
  font-size: 0.68rem;
}

.cards-grid{
  display:flex;
  flex-direction:column;
  gap: 10px;
}

/* ---------- Event card ---------- */
.event-card{
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-left: 4px solid var(--sport-color, var(--accent));
  border-radius: 12px;
  padding: 14px 16px;
  display:flex;
  gap: 14px;
  align-items:flex-start;
  transition: all 0.15s ease;
  position: relative;
}

.event-card:hover{
  background: var(--bg-card-hover);
  transform: translateX(2px);
}

.event-card.is-past{
  opacity: 0.55;
}

.event-card.is-past:hover{
  opacity: 0.85;
}

.event-icon{
  font-size: 1.6rem;
  line-height:1;
  flex-shrink:0;
  width: 40px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  background: color-mix(in srgb, var(--sport-color, var(--accent)) 18%, transparent);
  border-radius: 10px;
}

.event-main{
  flex:1;
  min-width:0;
}

.event-top-row{
  display:flex;
  justify-content: space-between;
  align-items:flex-start;
  gap: 10px;
  flex-wrap: wrap;
}

.event-name{
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text);
  line-height:1.3;
}

.event-venue{
  font-size: 0.76rem;
  color: var(--text-faint);
  margin-top: 2px;
}

.badges{
  display:flex;
  gap: 6px;
  flex-wrap: wrap;
  flex-shrink:0;
}

.badge{
  font-size: 0.65rem;
  font-weight: 800;
  padding: 3px 8px;
  border-radius: 6px;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  white-space:nowrap;
}

.badge.live{
  background: #ff1744;
  color: #fff;
  animation: pulse 1.6s infinite;
}

.badge.upcoming{
  background: rgba(0,229,255,0.15);
  color: #00e5ff;
}

.badge.past{
  background: rgba(255,255,255,0.06);
  color: var(--text-faint);
}

.badge.mustwatch{
  background: linear-gradient(135deg, #ff9800, #ff5722);
  color: #fff;
}

.badge.exceeded{
  background: linear-gradient(135deg, #7c4dff, #536dfe);
  color: #fff;
}

@keyframes pulse{
  0%,100%{ opacity:1; }
  50%{ opacity: 0.6; }
}

.event-meta-row{
  display:flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-top: 8px;
  font-size: 0.78rem;
  color: var(--text-dim);
}

.event-meta-row .meta-item{
  display:flex;
  align-items:center;
  gap: 5px;
}

.event-meta-row .sport-tag{
  color: var(--sport-color, var(--accent));
  font-weight: 700;
}

.rating-row{
  margin-top: 10px;
  display:flex;
  align-items:center;
  gap: 14px;
  flex-wrap: wrap;
}

.rating-block{
  display:flex;
  align-items:center;
  gap: 6px;
  font-size: 0.76rem;
  color: var(--text-dim);
}

.stars{
  display:inline-flex;
  gap: 1px;
}

.star{
  cursor:pointer;
  font-size: 0.95rem;
  color: #3a3a45;
  transition: color 0.1s, transform 0.1s;
}

.star.filled{
  color: #ffb300;
}

.star.interactive:hover{
  transform: scale(1.2);
}

.expected-num{
  font-weight: 800;
  color: var(--text);
}

/* ---------- Month calendar view ---------- */
.month-nav{
  display:flex;
  align-items:center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 16px;
}

.month-nav h2{
  font-size: 1.1rem;
  font-weight: 800;
  min-width: 180px;
  text-align:center;
}

.month-nav button{
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  width: 36px;
  height:36px;
  border-radius: 8px;
  cursor:pointer;
  font-size: 1rem;
  font-family: inherit;
}

.month-grid{
  display:grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.month-grid .dow{
  text-align:center;
  font-size: 0.7rem;
  font-weight: 800;
  color: var(--text-faint);
  text-transform: uppercase;
  padding-bottom: 6px;
}

.month-cell{
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  min-height: 86px;
  padding: 6px;
  display:flex;
  flex-direction:column;
  gap: 3px;
  overflow:hidden;
}

.month-cell.empty{
  background: transparent;
  border: none;
}

.month-cell.is-today{
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent) inset;
}

.month-cell .cell-date{
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--text-dim);
}

.month-cell .cell-event{
  font-size: 0.62rem;
  padding: 2px 5px;
  border-radius: 4px;
  background: color-mix(in srgb, var(--sport-color, var(--accent)) 25%, #16161d);
  color: var(--text);
  white-space:nowrap;
  overflow:hidden;
  text-overflow: ellipsis;
  border-left: 2px solid var(--sport-color, var(--accent));
  cursor: pointer;
}

.cell-more{
  font-size: 0.6rem;
  color: var(--text-faint);
  padding-left: 4px;
}

/* ---------- Must watch section ---------- */
.mw-tier{
  margin-bottom: 30px;
}

.mw-tier h3{
  font-size: 1rem;
  font-weight: 800;
  margin-bottom: 12px;
  display:flex;
  align-items:center;
  gap: 8px;
}

.empty-state{
  text-align:center;
  padding: 60px 20px;
  color: var(--text-faint);
}

.empty-state .big{
  font-size: 2.4rem;
  margin-bottom: 12px;
}

/* ---------- Toast ---------- */
.toast{
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 14px 20px;
  border-radius: 12px;
  font-size: 0.85rem;
  max-width: 90vw;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  z-index: 100;
  opacity: 0;
  pointer-events:none;
  transition: all 0.25s ease;
  text-align:center;
}

.toast.show{
  opacity:1;
  transform: translateX(-50%) translateY(0);
  pointer-events:auto;
}

footer.app-footer{
  max-width: 1100px;
  margin: 40px auto 0;
  padding: 20px;
  text-align:center;
  color: var(--text-faint);
  font-size: 0.75rem;
  border-top: 1px solid var(--border);
}

/* ---------- Responsive ---------- */
@media (max-width: 640px){
  .brand h1{ font-size: 1.1rem; }
  .event-card{ padding: 12px; gap: 10px; }
  .event-icon{ width: 34px; height:34px; font-size: 1.3rem; }
  .month-cell{ min-height: 64px; }
  .month-cell .cell-event{ font-size: 0.55rem; }
  .header-actions .btn span.full-label{ display:none; }
}
</style>
</head>

<header class="top">
  <div class="header-inner">
    <div class="brand">
      <h1>🏆 Jack's Sports Calendar</h1>
      <div class="clock" id="liveClock">—</div>

      <button class="btn ghost" id="suggestBtn">💡 <span class="full-label">Suggest additions</span></button>

<div class="controls" id="calendarControls">

  tdf:         { label: "Tour de France",   color: "var(--c-cycling)",  icon: "🚴" },
  nrl:         { label: "NRL",              color: "var(--c-nrl)",      icon: "🏉" },
  cricket:     { label: "Cricket",          color: "var(--c-cricket)",  icon: "🏏" },
  nba:         { label: "NBA",              color: "var(--c-nba)",      icon: "🏀" },
  masters:     { label: "Masters",          color: "var(--c-golf)",     icon: "⛳" },
  lemans:      { label: "Le Mans",          color: "var(--c-lemans)",   icon: "🏁" },
  ski:         { label: "Ski/Alpine",       color: "var(--c-ski)",      icon: "⛷️" },
  nfl:         { label: "Super Bowl",       color: "var(--c-nfl)",      icon: "🏈" },
};

const FILTER_ORDER = ["all","f1","rugby","wimbledon","fifa","tdf","nrl","cricket","nba","masters","lemans","ski"];

/* ============ STATE ============ */
let activeFilter = "all";
let activeView = "list";
let activeTab = "calendar";
let monthCursor = new Date(2026, 6, 1); // July 2026 default

const RATINGS_KEY = "jacksSportsCalendar_actualRatings_v1";
function loadRatings(){
  try{ return JSON.parse(localStorage.getItem(RATINGS_KEY)) || {}; }catch(e){ return {}; }
}
function saveRatings(r){
  localStorage.setItem(RATINGS_KEY, JSON.stringify(r));
}
let ratings = loadRatings();

/* ============ TIME HELPERS ============ */
// "Now" is always computed relative to real device clock, treated as AEST for this app's purposes.
function nowAEST(){
  return new Date();
}

function eventDateTime(ev){
  // date "YYYY-MM-DD", time "HH:MM" -> local Date object (browser local time assumed AEST as app is AEST-only)
  const [y,m,d] = ev.date.split("-").map(Number);
  const [hh,mm] = ev.time.split(":").map(Number);
  return new Date(y, m-1, d, hh, mm, 0);
}

function fmtTime12(time){
  const [hh,mm] = time.split(":").map(Number);
  const period = hh >= 12 ? "pm" : "am";
  let h12 = hh % 12; if(h12===0) h12=12;
  return `${h12}:${String(mm).padStart(2,"0")}${period}`;
}

function fmtDateHeading(dateStr){
  const [y,m,d] = dateStr.split("-").map(Number);
  const dt = new Date(y, m-1, d);
  const opts = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
  return dt.toLocaleDateString('en-AU', opts);
}

function getEventStatus(ev){
  const start = eventDateTime(ev);
  const now = nowAEST();
  const liveWindowMs = (ev.liveWindow || 3) * 3600 * 1000;
  const end = new Date(start.getTime() + liveWindowMs);
  if (now >= start && now <= end) return "live";
  if (now < start) return "upcoming";
  return "past";
}

/* ============ RATING LOGIC ============ */
function getActual(id){
  return ratings[id] !== undefined ? ratings[id] : null;
}

function isPreFlagged(ev){
  return ev.expected >= 8;
}

function isUpgrade(ev){
  const actual = getActual(ev.id);
  if (actual === null) return false;
  return actual >= 8 && (actual - ev.expected) >= 2;
}

function isMustWatch(ev){
  return isPreFlagged(ev) || isUpgrade(ev);
}

/* ============ RENDER: SPORT FILTERS ============ */
function renderFilters(){
  const container = document.getElementById("sportFilters");
  container.innerHTML = "";
  FILTER_ORDER.forEach(key => {
    const btn = document.createElement("button");
    btn.className = "pill" + (activeFilter === key ? " active" : "");
    if (key !== "all"){
      btn.style.setProperty("--pill-color", SPORT_META[key].color);
    }
    const icon = key === "all" ? "🗓️" : SPORT_META[key].icon;
    const label = key === "all" ? "All" : SPORT_META[key].label;
    btn.innerHTML = `<span>${icon}</span><span>${label}</span>`;
    btn.addEventListener("click", () => {
      activeFilter = key;
      renderAll();
    });
    container.appendChild(btn);
  });
}

/* ============ FILTERED EVENTS ============ */
function getFilteredEvents(){
  let list = EVENTS.slice();
  if (activeFilter !== "all"){
    list = list.filter(e => e.key === activeFilter);
  }
  return list;
}

function sortedChrono(list){
  return list.slice().sort((a,b) => eventDateTime(a) - eventDateTime(b));
}

/* Upcoming first (ascending by date), past events at bottom (also ascending, but after all upcoming) */
function sortUpcomingFirst(list){
  const now = nowAEST();
  const upcoming = [];
  const past = [];
  list.forEach(e => {
    const status = getEventStatus(e);
    if (status === "past") past.push(e); else upcoming.push(e);
  });
  upcoming.sort((a,b) => eventDateTime(a) - eventDateTime(b));
  past.sort((a,b) => eventDateTime(a) - eventDateTime(b));
  return upcoming.concat(past);
}

/* ============ CARD BUILDER ============ */
function buildStars(ev, interactive){
  const actual = getActual(ev.id);
  const wrap = document.createElement("span");
  wrap.className = "stars";
  for (let i=1;i<=10;i++){
    const s = document.createElement("span");
    s.className = "star" + (interactive ? " interactive" : "") + (actual !== null && i <= actual ? " filled" : "");
    s.textContent = "★";
    s.title = `Rate ${i}/10`;
    if (interactive){
      s.addEventListener("click", (evt) => {
        evt.stopPropagation();
        const current = getActual(ev.id);
        // toggle off if clicking same value again
        if (current === i){
          delete ratings[ev.id];
        } else {
          ratings[ev.id] = i;
        }
        saveRatings(ratings);
        renderAll();
        showToast(`Actual spectacle for "${ev.name}" set to ${i}/10`);
      });
    }
    wrap.appendChild(s);
  }
  return wrap;
}

function buildEventCard(ev){
  const meta = SPORT_META[ev.key];
  const status = getEventStatus(ev);
  const actual = getActual(ev.id);
  const mustWatch = isPreFlagged(ev);
  const upgraded = isUpgrade(ev);

  const card = document.createElement("div");
  card.className = "event-card" + (status === "past" ? " is-past" : "");
  card.style.setProperty("--sport-color", meta.color);

  const icon = document.createElement("div");
  icon.className = "event-icon";
  icon.textContent = meta.icon;
  card.appendChild(icon);

  const mainDiv = document.createElement("div");
  mainDiv.className = "event-main";

  const topRow = document.createElement("div");
  topRow.className = "event-top-row";

  const nameWrap = document.createElement("div");
  const nameEl = document.createElement("div");
  nameEl.className = "event-name";
  nameEl.textContent = ev.name;
  nameWrap.appendChild(nameEl);
  if (ev.venue){
    const venueEl = document.createElement("div");
    venueEl.className = "event-venue";
    venueEl.textContent = ev.venue;
    nameWrap.appendChild(venueEl);
  }
  topRow.appendChild(nameWrap);

  const badges = document.createElement("div");
  badges.className = "badges";
  if (status === "live"){
    const b = document.createElement("span");
    b.className = "badge live";
    b.textContent = "● LIVE";
    badges.appendChild(b);
  } else if (status === "upcoming"){
    const b = document.createElement("span");
    b.className = "badge upcoming";
    b.textContent = "Upcoming";
    badges.appendChild(b);
  } else {
    const b = document.createElement("span");
    b.className = "badge past";
    b.textContent = "Past";
    badges.appendChild(b);
  }
  if (mustWatch){
    const b = document.createElement("span");
    b.className = "badge mustwatch";
    b.textContent = "🔥 Must Watch";
    badges.appendChild(b);
  }
  if (upgraded){
    const b = document.createElement("span");
    b.className = "badge exceeded";
    b.textContent = "⭐ Exceeded Expectations";
    badges.appendChild(b);
  }
  topRow.appendChild(badges);
  mainDiv.appendChild(topRow);

  const metaRow = document.createElement("div");
  metaRow.className = "event-meta-row";
  metaRow.innerHTML = `
    <span class="meta-item sport-tag">${meta.icon} ${meta.label}</span>
    <span class="meta-item">🕒 ${fmtTime12(ev.time)} AEST</span>
    <span class="meta-item">📡 ${ev.broadcaster}</span>
  `;
  mainDiv.appendChild(metaRow);

  const ratingRow = document.createElement("div");
  ratingRow.className = "rating-row";

  const expectedBlock = document.createElement("div");
  expectedBlock.className = "rating-block";
  expectedBlock.innerHTML = `Expected: <span class="expected-num">${ev.expected}/10</span>`;
  ratingRow.appendChild(expectedBlock);

  if (status === "past"){
    const actualBlock = document.createElement("div");
    actualBlock.className = "rating-block";
    const label = document.createElement("span");
    label.textContent = "Your rating:";
    actualBlock.appendChild(label);
    actualBlock.appendChild(buildStars(ev, true));
    if (actual !== null){
      const num = document.createElement("span");
      num.className = "expected-num";
      num.style.marginLeft = "4px";
      num.textContent = `${actual}/10`;
      actualBlock.appendChild(num);
    }
    ratingRow.appendChild(actualBlock);
  }

  mainDiv.appendChild(ratingRow);
  card.appendChild(mainDiv);
  return card;
}

/* ============ RENDER: LIST VIEW ============ */
function renderListView(){
  const container = document.getElementById("listView");
  container.innerHTML = "";
  const filtered = getFilteredEvents();
  if (filtered.length === 0){
    container.innerHTML = `<div class="empty-state"><div class="big">🗂️</div>No events match this filter.</div>`;
    return;
  }
  const ordered = sortUpcomingFirst(filtered);

  // group by date, preserving order
  const groups = [];
  const groupMap = {};
  ordered.forEach(ev => {
    if (!groupMap[ev.date]){
      groupMap[ev.date] = [];
      groups.push(ev.date);
    }
    groupMap[ev.date].push(ev);
  });

  const todayStr = formatDateKey(nowAEST());

  groups.forEach(dateStr => {
    const groupDiv = document.createElement("div");
    groupDiv.className = "date-group";

    const heading = document.createElement("div");
    heading.className = "date-heading";
    heading.innerHTML = fmtDateHeading(dateStr) + (dateStr === todayStr ? ' <span class="today-flag">TODAY</span>' : '');
    groupDiv.appendChild(heading);

    const grid = document.createElement("div");
    grid.className = "cards-grid";
    groupMap[dateStr].forEach(ev => grid.appendChild(buildEventCard(ev)));
    groupDiv.appendChild(grid);

    container.appendChild(groupDiv);
  });
}

function formatDateKey(dt){
  const y = dt.getFullYear();
  const m = String(dt.getMonth()+1).padStart(2,"0");
  const d = String(dt.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}

/* ============ RENDER: MONTH VIEW ============ */
function renderMonthView(){
  const container = document.getElementById("monthView");
  container.innerHTML = "";

  const nav = document.createElement("div");
  nav.className = "month-nav";
  const prevBtn = document.createElement("button");
  prevBtn.textContent = "‹";
  prevBtn.addEventListener("click", () => {
    monthCursor = new Date(monthCursor.getFullYear(), monthCursor.getMonth()-1, 1);
    renderMonthView();
  });
  const nextBtn = document.createElement("button");
  nextBtn.textContent = "›";
  nextBtn.addEventListener("click", () => {
    monthCursor = new Date(monthCursor.getFullYear(), monthCursor.getMonth()+1, 1);
    renderMonthView();
  });
  const title = document.createElement("h2");
  title.textContent = monthCursor.toLocaleDateString('en-AU', { month: 'long', year: 'numeric' });
  nav.appendChild(prevBtn);
  nav.appendChild(title);
  nav.appendChild(nextBtn);
  container.appendChild(nav);

  const grid = document.createElement("div");
  grid.className = "month-grid";
  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d => {
    const dow = document.createElement("div");
    dow.className = "dow";
    dow.textContent = d;
    grid.appendChild(dow);
  });

  const year = monthCursor.getFullYear();
  const month = monthCursor.getMonth();
  const firstDay = new Date(year, month, 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();

  const filtered = getFilteredEvents();
  const eventsByDate = {};
  filtered.forEach(ev => {
    if (!eventsByDate[ev.date]) eventsByDate[ev.date] = [];
    eventsByDate[ev.date].push(ev);
  });

  const todayStr = formatDateKey(nowAEST());

  for (let i=0;i<startWeekday;i++){
    const empty = document.createElement("div");
    empty.className = "month-cell empty";
    grid.appendChild(empty);
  }

  for (let day=1; day<=daysInMonth; day++){
    const dateStr = `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    const cell = document.createElement("div");
    cell.className = "month-cell" + (dateStr === todayStr ? " is-today" : "");

    const dateLabel = document.createElement("div");
    dateLabel.className = "cell-date";
    dateLabel.textContent = day;
    cell.appendChild(dateLabel);

    const dayEvents = (eventsByDate[dateStr] || []).sort((a,b) => a.time.localeCompare(b.time));
    const maxShow = 3;
    dayEvents.slice(0, maxShow).forEach(ev => {
      const meta = SPORT_META[ev.key];
      const evEl = document.createElement("div");
      evEl.className = "cell-event";
      evEl.style.setProperty("--sport-color", meta.color);
      evEl.textContent = `${meta.icon} ${ev.name}`;
      evEl.title = `${ev.name} — ${fmtTime12(ev.time)} AEST — ${ev.broadcaster}`;
      cell.appendChild(evEl);
    });
    if (dayEvents.length > maxShow){
      const more = document.createElement("div");
      more.className = "cell-more";
      more.textContent = `+${dayEvents.length - maxShow} more`;
      cell.appendChild(more);
    }

    grid.appendChild(cell);
  }

  container.appendChild(grid);
}

/* ============ RENDER: MUST WATCH ============ */
function renderMustWatch(){
  const container = document.getElementById("mustWatchView");
  container.innerHTML = "";

  const preFlagged = EVENTS.filter(isPreFlagged).sort((a,b) => b.expected - a.expected);
  const upgrades = EVENTS.filter(isUpgrade).sort((a,b) => getActual(b.id) - getActual(a.id));

  if (preFlagged.length === 0 && upgrades.length === 0){
    container.innerHTML = `<div class="empty-state"><div class="big">🔥</div>No Must Watch events yet.</div>`;
    return;
  }

  if (preFlagged.length){
    const tier = document.createElement("div");
    tier.className = "mw-tier";
    tier.innerHTML = `<h3>🔥 Pre-Flagged Must Watch <span style="color:var(--text-faint); font-weight:600; font-size:0.8rem;">(Expected ≥ 8/10)</span></h3>`;
    const grid = document.createElement("div");
    grid.className = "cards-grid";
    preFlagged.forEach(ev => grid.appendChild(buildEventCard(ev)));
    tier.appendChild(grid);
    container.appendChild(tier);
  }

  if (upgrades.length){
    const tier = document.createElement("div");
    tier.className = "mw-tier";
    tier.innerHTML = `<h3>⭐ Post-Broadcast Upgrades <span style="color:var(--text-faint); font-weight:600; font-size:0.8rem;">(Actual exceeded expected by 2+, actual ≥ 8)</span></h3>`;
    const grid = document.createElement("div");
    grid.className = "cards-grid";
    upgrades.forEach(ev => grid.appendChild(buildEventCard(ev)));
    tier.appendChild(grid);
    container.appendChild(tier);
  }
}

/* ============ TOAST ============ */
let toastTimer;
function showToast(msg){
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove("show"), 3200);
}

/* ============ LIVE CLOCK ============ */
function updateClock(){
  const now = nowAEST();
  const opts = { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
  document.getElementById("liveClock").textContent = now.toLocaleDateString('en-AU', opts) + " AEST";
}
setInterval(() => {
  updateClock();
  // re-render live badges periodically without full flicker (cheap: just re-render current view)
  renderCurrentSection(true);
}, 30000);

/* ============ TABS / VIEW SWITCHING ============ */
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeTab = btn.dataset.tab;
    renderAll();
  });
});

document.querySelectorAll(".view-toggle button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".view-toggle button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeView = btn.dataset.view;
    renderAll();
  });
});

function renderCurrentSection(){
  if (activeTab === "calendar"){
    if (activeView === "list") renderListView(); else renderMonthView();
  } else {
    renderMustWatch();
  }
}

function renderAll(){
  renderFilters();
  const calControls = document.getElementById("calendarControls");
  const listView = document.getElementById("listView");
  const monthView = document.getElementById("monthView");
  const mustWatchView = document.getElementById("mustWatchView");

  if (activeTab === "calendar"){
    calControls.style.display = "flex";
    mustWatchView.style.display = "none";
    if (activeView === "list"){
      listView.style.display = "block";
      monthView.style.display = "none";
      renderListView();
    } else {
      listView.style.display = "none";
      monthView.style.display = "block";
      renderMonthView();
    }
  } else {
    calControls.style.display = "none";
    listView.style.display = "none";
    monthView.style.display = "none";
    mustWatchView.style.display = "block";
    renderMustWatch();
  }
}

/* ============ SUGGEST ADDITIONS ============ */
document.getElementById("suggestBtn").addEventListener("click", () => {
  showToast("Check back weekly — new major events will be suggested based on your watch history.");
});

/* ============ ICS EXPORT ============ */
function pad2(n){ return String(n).padStart(2,"0"); }

function toICSDateUTC(dt){
  // convert AEST (UTC+10, fixed, no DST) wall-clock time to UTC for the ICS UTC timestamp
  const utcMs = dt.getTime() - (10*3600*1000) - (dt.getTimezoneOffset()*60000)*0;
  // Since browser Date object was constructed from local wall-clock components assumed as AEST,
  // we instead manually compute UTC by subtracting 10 hours from the AEST wall clock components.
  return null;
}

function buildICSDateTimeAEST(dateStr, timeStr){
  // dateStr YYYY-MM-DD, timeStr HH:MM -- these are AEST wall-clock values.
  // TZID form for DTSTART/DTEND using Australia/Sydney (note: Sydney observes DST Oct-Apr,
  // but per spec we treat as fixed UTC+10 AEST year-round for this app's purposes).
  const [y,m,d] = dateStr.split("-");
  const [hh,mm] = timeStr.split(":");
  return `${y}${m}${d}T${hh}${mm}00`;
}

function addHoursToDateTimeStr(dateStr, timeStr, hoursToAdd){
  const [y,m,d] = dateStr.split("-").map(Number);
  const [hh,mm] = timeStr.split(":").map(Number);
  const dt = new Date(y, m-1, d, hh, mm, 0);
  dt.setHours(dt.getHours() + hoursToAdd);
  const yy = dt.getFullYear();
  const mo = pad2(dt.getMonth()+1);
  const da = pad2(dt.getDate());
  const ho = pad2(dt.getHours());
  const mi = pad2(dt.getMinutes());
  return `${yy}${mo}${da}T${ho}${mi}00`;
}

function escapeICS(str){
  return String(str).replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\n/g,"\\n");
}

function generateICS(){
  const lines = [];
  lines.push("BEGIN:VCALENDAR");
  lines.push("VERSION:2.0");
  lines.push("PRODID:-//Jack's Sports Calendar//EN");
  lines.push("CALSCALE:GREGORIAN");
  lines.push("METHOD:PUBLISH");
  lines.push("X-WR-CALNAME:Jack's Sports Calendar");
  lines.push("X-WR-TIMEZONE:Australia/Sydney");

  // VTIMEZONE block for Australia/Sydney with fixed AEST(+10)/AEDT(+11) rules
  lines.push("BEGIN:VTIMEZONE");
  lines.push("TZID:Australia/Sydney");
  lines.push("BEGIN:STANDARD");
  lines.push("DTSTART:19700405T030000");
  lines.push("RRULE:FREQ=YEARLY;BYMONTH=4;BYDAY=1SU");
  lines.push("TZOFFSETFROM:+1100");
  lines.push("TZOFFSETTO:+1000");
  lines.push("TZNAME:AEST");
  lines.push("END:STANDARD");
  lines.push("BEGIN:DAYLIGHT");
  lines.push("DTSTART:19701004T020000");
  lines.push("RRULE:FREQ=YEARLY;BYMONTH=10;BYDAY=1SU");
  lines.push("TZOFFSETFROM:+1000");
  lines.push("TZOFFSETTO:+1100");
  lines.push("TZNAME:AEDT");
  lines.push("END:DAYLIGHT");
  lines.push("END:VTIMEZONE");

  const nowStamp = new Date();
  const dtstamp = `${nowStamp.getUTCFullYear()}${pad2(nowStamp.getUTCMonth()+1)}${pad2(nowStamp.getUTCDate())}T${pad2(nowStamp.getUTCHours())}${pad2(nowStamp.getUTCMinutes())}${pad2(nowStamp.getUTCSeconds())}Z`;

  EVENTS.forEach(ev => {
    const meta = SPORT_META[ev.key];
    const dtStart = buildICSDateTimeAEST(ev.date, ev.time);
    const durationHours = 3; // default assumed broadcast duration
    const dtEnd = addHoursToDateTimeStr(ev.date, ev.time, durationHours);
    const mustWatch = isPreFlagged(ev);
    const actual = getActual(ev.id);

    const descParts = [
      `Sport: ${meta.label}`,
      `Broadcaster: ${ev.broadcaster}`,
      `Expected Spectacle: ${ev.expected}/10`,
      `Must Watch: ${mustWatch ? "YES" : "No"}`
    ];
    if (ev.venue) descParts.push(`Venue: ${ev.venue}`);
    if (actual !== null) descParts.push(`Actual Spectacle: ${actual}/10`);
    const description = escapeICS(descParts.join("\n"));

    lines.push("BEGIN:VEVENT");
    lines.push(`UID:${ev.id}@jacks-sports-calendar`);
    lines.push(`DTSTAMP:${dtstamp}`);
    lines.push(`DTSTART;TZID=Australia/Sydney:${dtStart}`);
    lines.push(`DTEND;TZID=Australia/Sydney:${dtEnd}`);
    lines.push(`SUMMARY:${escapeICS((mustWatch ? "🔥 " : "") + meta.icon + " " + ev.name)}`);
    if (ev.venue) lines.push(`LOCATION:${escapeICS(ev.venue)}`);
    lines.push(`DESCRIPTION:${description}`);
    lines.push(`CATEGORIES:${escapeICS(meta.label)}`);
    lines.push("END:VEVENT");
  });

  lines.push("END:VCALENDAR");
  return lines.join("\r\n");
}

document.getElementById("exportBtn").addEventListener("click", () => {
  const icsContent = generateICS();
  const blob = new Blob([icsContent], { type: "text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "jacks-sports-calendar.ics";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(`Exported ${EVENTS.length} events to jacks-sports-calendar.ics`);
});

/* ============ INIT ============ */
updateClock();
setInterval(updateClock, 1000);
renderAll();
